; ESP32-C3 Super Mini + KY-040 → iPhone volume & play/pause
[env:esp32-c3-super-mini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
  h2zero/NimBLE-Arduino@^2.3.8
  https://github.com/HijelHub/HijelHID_BLEKeyboard.git

build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
